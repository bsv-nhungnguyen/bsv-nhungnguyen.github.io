<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: #fffbeb;
      padding: 16px;
      margin: 0;
      color: #92400e;
      border-left: 4px solid #f59e0b;
    }
    b { color: #f59e0b; font-size: 1rem; display: block; margin-bottom: 12px; }
    button {
      padding: 8px 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #f59e0b;
      color: #fff;
      font-weight: 600;
      font-size: 0.85rem;
      transition: background 0.2s;
    }
    button:hover { background: #d97706; }
    #res-C {
      font-size: 0.85rem;
      font-weight: 600;
      color: #b45309;
      margin-top: 12px;
      min-height: 20px;
    }
  </style>
</head>
<body>
  <b>🅲 Iframe Gamma</b>
  <button id="btn-C" onclick="document.getElementById('res-C').textContent='✨ Gamma Clicked!'">Click button</button>
  <div id="res-C"></div>
</body>
</html>
