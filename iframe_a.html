<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: #f1f5f9;
      padding: 16px;
      margin: 0;
      color: #1e293b;
      border-left: 4px solid #8b5cf6;
    }

    b {
      color: #8b5cf6;
      font-size: 1.1rem;
      display: block;
      margin-bottom: 12px;
    }

    .btn-group {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    button {
      padding: 8px 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #8b5cf6;
      color: #fff;
      font-weight: 600;
      font-size: 0.85rem;
      transition: background 0.2s;
    }

    button:hover {
      background: #7c3aed;
    }

    #res-A {
      font-size: 0.85rem;
      font-weight: 600;
      color: #10b981;
      min-height: 20px;
    }

    iframe {
      display: none;
      width: 100%;
      height: 160px;
      border: 2px dashed #10b981;
      border-radius: 12px;
      margin-top: 12px;
      background: #fff;
    }
  </style>
</head>

<body>
  <b>🅰 Iframe Alpha</b>
  <div class="btn-group">
    <button id="btn-A" onclick="document.getElementById('res-A').textContent='✨ Alpha Clicked!'">Click button</button>
    <button id="btn-open-B" onclick="document.getElementById('iframe-B').style.display='block'">Open Iframe B</button>
  </div>
  <div id="res-A"></div>
  <iframe id="iframe-B" src="iframe_b.html?v=1.1"></iframe>
</body>

</html>
