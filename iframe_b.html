<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: #ecfdf5;
      padding: 16px;
      margin: 0;
      color: #065f46;
      border-left: 4px solid #10b981;
    }
    b { color: #10b981; font-size: 1rem; display: block; margin-bottom: 12px; }
    .btn-group { display: flex; gap: 8px; margin-bottom: 12px; }
    button {
      padding: 8px 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #10b981;
      color: #fff;
      font-weight: 600;
      font-size: 0.85rem;
      transition: background 0.2s;
    }
    button:hover { background: #059669; }
    #res-B {
      font-size: 0.85rem;
      font-weight: 600;
      color: #059669;
      min-height: 20px;
    }
    iframe {
      display: none;
      width: 100%;
      height: 100px;
      border: 2px dashed #f59e0b;
      border-radius: 12px;
      margin-top: 12px;
      background: #fff;
    }
  </style>
</head>
<body>
  <b>🅱 Iframe Beta</b>
  <div class="btn-group">
    <button id="btn-B" onclick="document.getElementById('res-B').textContent='✨ Beta Clicked!'">Click button</button>
    <button id="btn-open-C" onclick="document.getElementById('iframe-C').style.display='block'">Open Iframe C</button>
  </div>
  <div id="res-B"></div>
  <iframe id="iframe-C" src="iframe_c.html?v=1.1"></iframe>
</body>
</html>
